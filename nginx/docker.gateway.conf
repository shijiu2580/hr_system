# Docker 网关 Nginx 配置
# 用途：统一入口转发到 Web、Mobile、API

upstream hr_backend {
    server hr-backend:8000;
}

upstream hr_frontend {
    server hr-frontend:80;
}

upstream hr_mobile {
    server hr-mobile:80;
}

# Web 管理端
server {
    listen 80;
    server_name canway.site www.canway.site;

    client_max_body_size 50M;

    location /api/ {
        proxy_pass http://hr_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        proxy_pass http://hr_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        proxy_pass http://hr_backend;
    }

    location /media/ {
        proxy_pass http://hr_backend;
    }

    location / {
        proxy_pass http://hr_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# 移动端
