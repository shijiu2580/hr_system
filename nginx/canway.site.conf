server {
    listen 443 ssl http2;
    server_name api.canway.site;

    ssl_certificate /etc/letsencrypt/live/canway.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/canway.site/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=63072000" always;
    client_max_body_size 50M;

    location / {
        proxy_pass http://hr_core_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host 121.40.145.14;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /static/ {
        proxy_pass http://hr_core_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host 121.40.145.14;
        proxy_set_header X-Forwarded-Host $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        proxy_pass http://hr_core_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host 121.40.145.14;
        proxy_set_header X-Forwarded-Host $host;
        expires 7d;
    }
}

