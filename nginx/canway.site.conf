# canway.site Nginx 配置
# 角色：腾讯云入口层（域名、HTTPS、Web/Mobile 静态入口）
# 放置到服务器 /etc/nginx/sites-available/ 并 ln -s 到 sites-enabled/

upstream hr_web_frontend {
    server 127.0.0.1:3000;
}

upstream hr_mobile_frontend {
    server 127.0.0.1:3001;
}

upstream hr_core_backend {
    server 121.40.145.14:80;
    keepalive 64;
}

server {
    listen 80;
    server_name canway.site www.canway.site m.canway.site api.canway.site;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name canway.site www.canway.site;

    ssl_certificate /etc/letsencrypt/live/canway.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/canway.site/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=63072000" always;

    location /api/ {
        proxy_pass http://hr_core_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host 121.40.145.14;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        proxy_pass http://hr_core_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host 121.40.145.14;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        proxy_pass http://hr_core_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host 121.40.145.14;
        proxy_set_header X-Forwarded-Host $host;
    }

    location /media/ {
        proxy_pass http://hr_core_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host 121.40.145.14;
        proxy_set_header X-Forwarded-Host $host;
    }

    location / {
        proxy_pass http://hr_web_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

