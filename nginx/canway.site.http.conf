upstream hr_web_frontend {
    server 127.0.0.1:3000;
}

upstream hr_mobile_frontend {
    server 127.0.0.1:3001;
}

upstream hr_core_backend {
    server 121.40.145.14:80;
}

server {
    listen 80;
    server_name canway.site www.canway.site;

    client_max_body_size 50M;

    location /api/ {
        proxy_pass http://hr_core_backend;
        proxy_set_header Host 121.40.145.14;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        proxy_pass http://hr_core_backend;
        proxy_set_header Host 121.40.145.14;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        proxy_pass http://hr_core_backend;
        proxy_set_header Host 121.40.145.14;
        proxy_set_header X-Forwarded-Host $host;
    }

    location /media/ {
        proxy_pass http://hr_core_backend;
        proxy_set_header Host 121.40.145.14;
        proxy_set_header X-Forwarded-Host $host;
    }

    location / {
        proxy_pass http://hr_web_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

