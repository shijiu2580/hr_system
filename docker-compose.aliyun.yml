services:
  nginx:
    image: nginx:1.27-alpine
    container_name: hr-gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx/docker.core.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - hr_core_network

  backend:
    build: .
    container_name: hr-backend
    expose:
      - "8000"
    volumes:
      - media_data:/app/media
      - logs_data:/app/logs
    mem_limit: 200m
    mem_reservation: 100m
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-hr_user}:${POSTGRES_PASSWORD:-change_me}@pgbouncer:6432/${POSTGRES_DB:-hr_system}
    depends_on:
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - hr_core_network

  pgbouncer:
    image: pgbouncer/pgbouncer:latest
    container_name: hr-pgbouncer
    environment:
      DATABASES_HOST: postgres
      DATABASES_PORT: 5432
      DATABASES_DBNAME: ${POSTGRES_DB:-hr_system}
      DATABASES_USER: ${POSTGRES_USER:-hr_user}
      DATABASES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      PGBOUNCER_LISTEN_PORT: 6432
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_MAX_CLIENT_CONN: 400
      PGBOUNCER_DEFAULT_POOL_SIZE: 30
      PGBOUNCER_RESERVE_POOL_SIZE: 10
      PGBOUNCER_SERVER_RESET_QUERY: DISCARD ALL
      PGBOUNCER_IGNORE_STARTUP_PARAMETERS: extra_float_digits
      PGBOUNCER_ADMIN_USERS: ${POSTGRES_USER:-hr_user}
    expose:
      - "6432"
    healthcheck:
      test: ["CMD", "sh", "-c", "nc -z 127.0.0.1 6432"]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - hr_core_network

  postgres:
    image: postgres:16-alpine
    container_name: hr-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hr_system}
      POSTGRES_USER: ${POSTGRES_USER:-hr_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hr_user} -d ${POSTGRES_DB:-hr_system}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - hr_core_network

  redis:
    image: redis:7-alpine
    container_name: hr-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - hr_core_network

volumes:
  postgres_data:
  redis_data:
  media_data:
  logs_data:

networks:
  hr_core_network:
    driver: bridge
